name: Custom Frappe App CI

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: custom-frappe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FRAPPE_DOCKER_REF: 9d31a2d2dedef3f16366b110291d33e93eeaf34a

jobs:
  test:
    name: Test custom app
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Run package tests
        run: python -m unittest discover -s tests -v

  publish-staging-image:
    name: Publish staging Frappe image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/staging'
    needs:
      - test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out Frappe Docker build context
        shell: bash
        run: |
          set -euo pipefail
          git clone --filter=blob:none https://github.com/frappe/frappe_docker.git frappe_docker
          git -C frappe_docker checkout "$FRAPPE_DOCKER_REF"

      - name: Create private app manifest
        shell: bash
        env:
          REPOSITORY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          jq -n \
            --arg token "$REPOSITORY_TOKEN" \
            '[
              {
                "url": "https://github.com/frappe/erpnext",
                "branch": "version-16"
              },
              {
                "url": "https://github.com/resilient-tech/india-compliance",
                "branch": "version-16"
              },
              {
                "url": ("https://x-access-token:" + $token + "@github.com/YugKp44/Erpnext-custom-app.git"),
                "branch": "staging"
              }
            ]' > "$RUNNER_TEMP/apps.json"
          chmod 600 "$RUNNER_TEMP/apps.json"

      - name: Calculate image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/speedaily-erpnext-india"
          {
            echo "image=$image"
            echo "tags<<EOF"
            echo "$image:staging"
            echo "$image:staging-$GITHUB_SHA"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish staging image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frappe_docker
          file: ./frappe_docker/images/custom/Containerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            PYTHON_VERSION=3.14.2
            NODE_VERSION=24.12.0
            CACHE_BUST=${{ github.sha }}
          secret-files: |
            apps_json=${{ runner.temp }}/apps.json
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Report published image
        run: echo "Published ${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Remove private app manifest
        if: always()
        run: rm -f "$RUNNER_TEMP/apps.json"

  deploy-staging:
    name: Trigger staging Frappe deployment
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/staging'
    needs:
      - publish-staging-image
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging

    steps:
      - name: Trigger Infrastructure staging workflow
        shell: bash
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$INFRA_DISPATCH_TOKEN" ]; then
            echo "INFRA_DISPATCH_TOKEN is not configured in the staging environment" >&2
            exit 1
          fi

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 3 \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $INFRA_DISPATCH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/YugKp44/Speedaily-Infrastructure/actions/workflows/deploy-staging-frappe.yml/dispatches \
            --data '{"ref":"staging"}'

          echo "Infrastructure staging Frappe deployment triggered"
